name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build for x86_64
        run: swift build -c release --arch x86_64

      - name: Build for arm64
        run: swift build -c release --arch arm64

      - name: Create Universal Binary
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/xcstrings-crud \
            .build/x86_64-apple-macosx/release/xcstrings-crud \
            -output .build/universal/xcstrings-crud

      - name: Package Release Assets
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p \
            .build/release-assets/arm64 \
            .build/release-assets/x86_64 \
            .build/release-assets/universal
          cp \
            .build/arm64-apple-macosx/release/xcstrings-crud \
            ".build/release-assets/arm64/xcstrings-crud"
          cp \
            .build/x86_64-apple-macosx/release/xcstrings-crud \
            ".build/release-assets/x86_64/xcstrings-crud"
          cp \
            .build/universal/xcstrings-crud \
            ".build/release-assets/universal/xcstrings-crud"
          chmod +x \
            ".build/release-assets/arm64/xcstrings-crud" \
            ".build/release-assets/x86_64/xcstrings-crud" \
            ".build/release-assets/universal/xcstrings-crud"
          tar -C .build/release-assets/arm64 -czvf \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-arm64.tar.gz" \
            xcstrings-crud
          tar -C .build/release-assets/x86_64 -czvf \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-x86_64.tar.gz" \
            xcstrings-crud
          tar -C .build/release-assets/universal -czvf \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-universal.tar.gz" \
            xcstrings-crud
          rm -rf \
            .build/release-assets/arm64 \
            .build/release-assets/x86_64 \
            .build/release-assets/universal

      - name: Generate Checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd .build/release-assets
          shasum -a 256 \
            "xcstrings-crud-${TAG_NAME}-darwin-arm64.tar.gz" \
            "xcstrings-crud-${TAG_NAME}-darwin-x86_64.tar.gz" \
            "xcstrings-crud-${TAG_NAME}-darwin-universal.tar.gz" > checksums.txt

      - name: Upload Release Assets
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${TAG_NAME}" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-arm64.tar.gz" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-x86_64.tar.gz" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-universal.tar.gz" \
            ".build/release-assets/checksums.txt"
