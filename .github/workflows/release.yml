name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build for x86_64
        run: swift build -c release --arch x86_64

      - name: Build for arm64
        run: swift build -c release --arch arm64

      - name: Create Universal Binary
        run: |
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/xcstrings-crud \
            .build/x86_64-apple-macosx/release/xcstrings-crud \
            -output .build/universal/xcstrings-crud

      - name: Stage Release Assets
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p .build/release-assets
          cp \
            .build/arm64-apple-macosx/release/xcstrings-crud \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-arm64"
          cp \
            .build/x86_64-apple-macosx/release/xcstrings-crud \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-x86_64"
          cp \
            .build/universal/xcstrings-crud \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-universal"
          chmod +x \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-arm64" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-x86_64" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-universal"

      - name: Generate Checksums
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd .build/release-assets
          shasum -a 256 \
            "xcstrings-crud-${TAG_NAME}-darwin-arm64" \
            "xcstrings-crud-${TAG_NAME}-darwin-x86_64" \
            "xcstrings-crud-${TAG_NAME}-darwin-universal" > checksums.txt

      - name: Upload Release Assets
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${TAG_NAME}" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-arm64" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-x86_64" \
            ".build/release-assets/xcstrings-crud-${TAG_NAME}-darwin-universal" \
            ".build/release-assets/checksums.txt"
